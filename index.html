<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Eshu Ji</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#3e2723,#1b1b1b);
padding:20px;
font-family:'Cormorant Garamond',serif;
}

.card{
width:100%;
max-width:500px;
background:#fdf6e3;
border-radius:18px;
padding:35px 28px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
top:-30px;
right:25px;
width:70px;
height:70px;
background:#8b0000;
border-radius:50%;
box-shadow:0 0 20px rgba(139,0,0,0.4);
}

.card::after{
content:'🕯️';
position:absolute;
top:10px;
right:42px;
font-size:28px;
}

.name{
font-family:'Dancing Script',cursive;
font-size:32px;
color:#5d4037;
margin-bottom:20px;
}

.message{
font-size:22px;
line-height:1.8;
color:#4e342e;
}

.from{
margin-top:30px;
text-align:right;
font-family:'Dancing Script',cursive;
font-size:28px;
color:#5d4037;
}

iframe{
margin-top:25px;
width:100%;
height:80px;
border-radius:12px;
}

@media(max-width:500px){
.message{
font-size:18px;
}
.name,.from{
font-size:26px;
}
}
</style>
</head>
<body>

<div class="card">

<div class="name">Eshu ji,</div>

<div class="message">
Us time sach me mujhe kuch samajh nahi aa raha tha,  
isliye thoda jaldi react kar diya.  
Mujhe laga aap seriously bol rahi ho,  
toh bas confuse ho gaya tha.  
Agar us wajah se kuch ajeeb laga ho toh sorry.
</div>

<div class="from">Aniketh</div>

<!-- Replace YOUR_SPOTIFY_LINK -->

</div>

</body>
</html>
